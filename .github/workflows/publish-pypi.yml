name: Publish to PyPI

# 触发：推送 tag (v*) 时自动发布到 PyPI
# 用 Trusted Publishing (OIDC) — 无需 PyPI token
#
# 用户设置（一次性）:
#   1. 在 https://pypi.org 注册（或登录）
#   2. 进入 https://pypi.org/manage/account/publishing/ 添加 trusted publisher:
#      - PyPI Project Name: spyeyes
#      - Owner: Akxan
#      - Repository name: SpyEyes
#      - Workflow filename: publish-pypi.yml
#      - Environment: pypi
#   3. 在 GitHub repo Settings → Environments 创建 environment 'pypi'
#   4. 推 tag v1.0.x 即自动发布

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/spyeyes/
    permissions:
      # OIDC Trusted Publishing 需要 id-token: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify wheel contents（确保 platforms.json 在内）
        run: |
          python -m zipfile -l dist/*.whl | grep platforms.json || \
            (echo "ERROR: platforms.json 不在 wheel 里" && exit 1)

      - name: Smoke test installed wheel
        run: |
          pip install dist/*.whl
          spyeyes --version
          python -c "import spyeyes; assert len(spyeyes.PLATFORMS) > 2000"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # 不传 password —— 用 OIDC trusted publishing
