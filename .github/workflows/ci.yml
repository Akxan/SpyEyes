name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同分支重复 push 时取消旧 build，节省 CI 配额
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: ruff
        run: ruff check .
      - name: mypy
        run: mypy spyeyes.py tools/build_platforms.py --ignore-missing-imports
      - name: bandit
        run: bandit -r spyeyes.py tools/ -ll

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # 减少冗余：Linux 跑全 4 版本，macOS/Windows 只跑最低和最高
      matrix:
        include:
          - { os: ubuntu-latest,  python-version: '3.10' }
          - { os: ubuntu-latest,  python-version: '3.11' }
          - { os: ubuntu-latest,  python-version: '3.12' }
          - { os: ubuntu-latest,  python-version: '3.13' }
          - { os: macos-latest,   python-version: '3.10' }
          - { os: macos-latest,   python-version: '3.13' }
          - { os: windows-latest, python-version: '3.10' }
          - { os: windows-latest, python-version: '3.13' }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        # --cov=spyeyes 替代 --cov=. 避免把 .venv/.mypy_cache 纳入覆盖率
        # --timeout=15 防纯 Python 死循环卡死 CI（注意：thread 方法对 C 扩展
        #   阻塞如 re 模块 catastrophic backtracking 无效；ReDoS 实际靠
        #   MAX_USERNAME_LENGTH=64 输入限制 + 删除 _REDOS_RE 启发式后简化的设计）
        # --timeout-method=thread: Windows 上 SIGALRM 不可用，必须显式声明
        run: pytest tests/ -v --cov=spyeyes --cov-report=term --cov-report=xml --timeout=15 --timeout-method=thread

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          # v6 用 'files' (复数)，v3 的 'file' 已废弃 → 之前可能被静默忽略
          files: ./coverage.xml
          fail_ci_if_error: false
